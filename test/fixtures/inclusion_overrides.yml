# New checkbox-model inclusion overrides (Phase 7).
# Each record represents a hidden item at a specific path within a root group's tree.
# path = array of group IDs from root (exclusive) to the group containing the target (inclusive).

# Alpha Clan: hide Rogue Pack when reached via Spectrum → Prism Circle
# (but NOT via Echo Shard → Prism Circle — diamond-path test)
rogue_pack_hidden_in_alpha_via_spectrum:
  group: alpha_clan
  path: <%= [ActiveRecord::FixtureSet.identify(:spectrum), ActiveRecord::FixtureSet.identify(:prism_circle)].to_json %>
  target_type: Group
  target_id: <%= ActiveRecord::FixtureSet.identify(:rogue_pack) %>

# Castle Clan: hide Drift (profile) in Flux
drift_hidden_in_castle:
  group: castle_clan
  path: <%= [ActiveRecord::FixtureSet.identify(:flux)].to_json %>
  target_type: Profile
  target_id: <%= ActiveRecord::FixtureSet.identify(:drift) %>

# Castle Clan: hide Ripple (profile) in Flux
ripple_hidden_in_castle:
  group: castle_clan
  path: <%= [ActiveRecord::FixtureSet.identify(:flux)].to_json %>
  target_type: Profile
  target_id: <%= ActiveRecord::FixtureSet.identify(:ripple) %>

# Castle Clan: hide Static Burst (group) in Flux
static_burst_hidden_in_castle:
  group: castle_clan
  path: <%= [ActiveRecord::FixtureSet.identify(:flux)].to_json %>
  target_type: Group
  target_id: <%= ActiveRecord::FixtureSet.identify(:static_burst) %>

# Alpha Clan: hide Stray (profile) in Rogue Pack via Spectrum path only
# (diamond-path test — Stray remains visible via Echo Shard → Prism Circle → Rogue Pack)
stray_hidden_in_rogue_pack_via_spectrum:
  group: alpha_clan
  path: <%= [ActiveRecord::FixtureSet.identify(:spectrum), ActiveRecord::FixtureSet.identify(:prism_circle), ActiveRecord::FixtureSet.identify(:rogue_pack)].to_json %>
  target_type: Profile
  target_id: <%= ActiveRecord::FixtureSet.identify(:stray) %>
